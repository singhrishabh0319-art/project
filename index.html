<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyShop</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>MyShop</h1>

<nav>
<a href="#">Home</a>
<a href="#">Shop</a>

</nav>

<div class="cart">
🛒 Cart: <span id="cart-count">0</span>
</div>

</header>

<section class="hero">

</section>

<section class="products">

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Smartphone</h3>
<p>$499</p>

</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Laptop</h3>
<p>$899</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Headphones</h3>
<p>$99</p>
<button onclick="addCart()">Add to Cart</button>
</div>

<div class="card">
<img src="https://via.placeholder.com/200">
<h3>Smart Watch</h3>
<p>$199</p>
<button onclick="addCart()">Add to Cart</button>
</div>

</section>

<footer>
<p>© 2026 MyShop</p>
</footer>

<script src="script.js"></script>
</body>
</html>
